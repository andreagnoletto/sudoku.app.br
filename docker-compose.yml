services:
  sudoku:
    build:
      context: .
      dockerfile: Dockerfile
    image: wise-sudoku:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NITRO_HOST=0.0.0.0
      - NITRO_PORT=3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

